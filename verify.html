<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="color-scheme" content="light"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Member Verification — Vision Forge</title>
  <meta name="description" content="Official Vision Forge member verification portal."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&family=Outfit:wght@300;400;500;600;700&family=Dancing+Script:wght@500;600;700&display=swap" rel="stylesheet"/>
  <style>
:root {
  color-scheme: light;
  --navy:       #0d1f35;
  --navy-mid:   #1a3254;
  --ink:        #1a4b8c;
  --ink-pale:   #edf3fb;
  --gold:       #b8922a;
  --gold-light: #d4ab52;
  --gold-pale:  #faf5ea;
  --ivory:      #fdfcf9;
  --white:      #ffffff;
  --off-white:  #f8f7f4;
  --border:     rgba(13,31,53,0.08);
  --border-mid: rgba(13,31,53,0.14);
  --text:       #1a2e42;
  --text-mid:   #4a5e72;
  --text-light: rgba(26,46,66,0.45);
  --green:      #16813b;
  --red:        #c0392b;
  --radius:     10px;
  --radius-lg:  18px;
  --radius-xl:  26px;
  --ease:       cubic-bezier(0.22,1,0.36,1);
  --serif:      'Cormorant Garamond', Georgia, serif;
  --body:       'Outfit', system-ui, sans-serif;
  --script:     'Dancing Script', cursive;
  --shadow-md:  0 6px 28px rgba(13,31,53,0.10);
  --shadow-xl:  0 28px 72px rgba(13,31,53,0.17);
  --nav-h:      72px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;}
body{background:var(--ivory);color:var(--text);font-family:var(--body);line-height:1.75;min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;overflow-x:hidden;-webkit-text-size-adjust:100%;text-size-adjust:100%;}
a{text-decoration:none;color:inherit;-webkit-tap-highlight-color:transparent;}

/* NAV */
.navbar{position:sticky;top:0;z-index:99;height:var(--nav-h);background:var(--navy);display:flex;align-items:center;padding:0 5%;box-shadow:0 2px 20px rgba(13,31,53,.22);padding-left:max(5%,env(safe-area-inset-left));padding-right:max(5%,env(safe-area-inset-right));}
.nav-inner{width:100%;max-width:1140px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.nav-logo img{height:44px;width:auto;display:block;flex-shrink:0;}
.nav-logo:hover img{opacity:.78;}
.nav-r{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.ntag{font-size:.62rem;font-weight:600;letter-spacing:.26em;text-transform:uppercase;color:rgba(255,255,255,.38);}
.ndiv{width:1px;height:16px;background:rgba(255,255,255,.14);}
.nback{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:100px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.65);font-size:.73rem;font-weight:500;transition:all .25s;font-family:var(--body);}
.nback:hover{background:rgba(255,255,255,.14);color:#fff;}
.nback svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;}

/* PAGE */
.page{flex:1;display:flex;flex-direction:column;align-items:center;padding:56px 16px max(80px,calc(80px + env(safe-area-inset-bottom)));position:relative;}
.page::before{content:'';position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:72px 72px;opacity:.35;z-index:0;}
.page::after{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 70% 60% at 50% 30%,transparent 35%,rgba(253,252,249,.92) 100%);z-index:0;}

/* HEADER */
.ph{position:relative;z-index:1;text-align:center;margin-bottom:44px;opacity:0;animation:fD .6s var(--ease) forwards;}
.eyebrow{display:inline-flex;align-items:center;gap:10px;font-size:.67rem;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:var(--ink);margin-bottom:14px;}
.eyebrow::before,.eyebrow::after{content:'';display:block;width:22px;height:1px;background:var(--gold);}
.ph h1{font-family:var(--serif);font-size:clamp(2rem,5vw,3.2rem);font-weight:700;line-height:1.08;letter-spacing:-.02em;color:var(--navy);margin-bottom:8px;}
.ph h1 em{font-style:italic;color:var(--ink);font-weight:300;}
.ph p{font-size:.88rem;color:var(--text-mid);}

/* CARD */
.card{width:100%;max-width:580px;position:relative;z-index:1;background:var(--white);border:1px solid var(--border-mid);border-radius:var(--radius-xl);overflow:hidden;box-shadow:var(--shadow-xl);opacity:0;animation:fU .7s .1s var(--ease) forwards;}
.card.wide{max-width:700px;}

/* CARD HEADER */
.chdr{background:linear-gradient(135deg,var(--navy) 0%,#1a3254 60%,#162d4f 100%);padding:22px 28px;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden;}
.chdr::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:40px 40px;}
.chdr::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold-light),transparent);}

/* LOGO IN HEADER */
.chdr-logo{position:relative;z-index:1;display:flex;align-items:center;}
.chdr-logo svg{height:38px;width:auto;display:block;}

/* BADGE */
.vbadge{display:flex;align-items:center;gap:7px;padding:6px 14px;border-radius:100px;font-size:.66rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;position:relative;z-index:1;}
.vbadge.ok{background:rgba(22,129,59,.18);color:#4ade80;border:1px solid rgba(74,222,128,.28);}
.vbadge.fail{background:rgba(220,38,38,.18);color:#f87171;border:1px solid rgba(248,113,113,.28);}
.bdot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:blink 2.2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}

/* SEAL STRIP */
.seal{background:var(--gold-pale);border-bottom:1px solid rgba(184,146,42,.18);padding:9px 28px;display:flex;align-items:center;gap:10px;}
.stxt{font-size:.62rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);}
.sln{flex:1;height:1px;background:linear-gradient(90deg,rgba(184,146,42,.3),transparent);}

/* PROFILE */
.profile{padding:28px 28px 36px;display:flex;gap:28px;align-items:flex-start;border-bottom:1px solid var(--border);}
.avw{position:relative;flex-shrink:0;}
.av{width:160px;height:160px;border-radius:var(--radius-lg);border:3px solid var(--gold-light);overflow:hidden;background:var(--ink-pale);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:3rem;font-weight:700;color:var(--ink);flex-shrink:0;box-shadow:0 0 0 5px rgba(184,146,42,0.15),0 8px 32px rgba(13,31,53,0.18);}
.av img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block;}
.rpill{position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);background:var(--navy);color:var(--gold-light);font-size:.52rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;padding:4px 12px;border-radius:100px;white-space:nowrap;border:1px solid rgba(212,171,82,.3);}
.pmeta{display:flex;flex-direction:column;gap:4px;padding-top:2px;flex:1;min-width:0;}
.mname{font-family:var(--serif);font-size:clamp(1.4rem,4vw,1.85rem);font-weight:700;color:var(--navy);line-height:1.1;}
.mtitle{font-size:.67rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--ink);margin-top:2px;}
.mdept{font-size:.82rem;color:var(--text-mid);}
.msig{font-family:var(--script);font-size:1.75rem;color:var(--gold);opacity:.55;line-height:1;margin-top:6px;}

/* DETAIL GRID */
.dgrid{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border);}
.dc{padding:16px 28px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
.dc:nth-child(even){border-right:none;}
.dc:nth-last-child(-n+2){border-bottom:none;}
.dlbl{font-size:.58rem;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:var(--text-light);margin-bottom:5px;}
.dval{font-size:.88rem;font-weight:700;color:var(--navy);}
.dval.mono{font-family:'Courier New',monospace;font-size:.84rem;color:var(--ink);letter-spacing:.04em;}
.dval.active{color:var(--green);display:flex;align-items:center;gap:7px;}
.dval.active::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(22,129,59,.18);}
.dval.sm{font-size:.78rem;font-weight:600;}

/* INFO STRIPS */
.istrip{border-bottom:1px solid var(--border);padding:15px 28px;display:flex;align-items:flex-start;gap:14px;}
.istrip.alt{background:var(--ivory);}
.iico{width:36px;height:36px;border-radius:9px;background:var(--ink-pale);border:1px solid rgba(26,75,140,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.iico.gold{background:rgba(184,146,42,.08);border-color:rgba(184,146,42,.2);}
.ilbl{font-size:.58rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--text-light);margin-bottom:5px;}
.ival{font-size:.85rem;font-weight:600;color:var(--navy);line-height:1.45;}
.isub{font-size:.75rem;color:var(--text-mid);margin-top:2px;}

/* CONTACT LINKS */
.cstrip{border-bottom:1px solid var(--border);padding:15px 28px;display:flex;flex-wrap:wrap;gap:10px;}
.clink{display:inline-flex;align-items:center;gap:7px;padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border-mid);background:var(--off-white);font-size:.74rem;font-weight:600;color:var(--navy);transition:all .25s var(--ease);}
.clink:hover{border-color:rgba(26,75,140,.3);background:var(--ink-pale);color:var(--ink);transform:translateY(-2px);box-shadow:var(--shadow-md);}
.clink svg{width:13px;height:13px;flex-shrink:0;}

/* BIO */
.bio{padding:20px 28px;border-bottom:1px solid var(--border);background:var(--off-white);}
.blbl{font-size:.58rem;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:var(--text-light);margin-bottom:8px;}
.btxt{font-size:.84rem;line-height:1.85;color:var(--text-mid);}

/* CARD FOOT */
.cfoot{padding:18px 28px;display:flex;align-items:flex-start;justify-content:space-between;background:var(--ivory);gap:12px;flex-wrap:wrap;}
.fleft .forg{font-size:.78rem;font-weight:700;color:var(--navy);}
.fleft .fts{font-size:.65rem;color:var(--text-light);margin-top:2px;}
.gseal{display:inline-flex;align-items:center;gap:5px;font-size:.58rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-top:7px;padding:3px 10px;border-radius:100px;border:1px solid rgba(184,146,42,.28);background:rgba(184,146,42,.06);}
.hblk{text-align:right;}
.hlbl{font-size:.56rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--text-light);margin-bottom:4px;}
.hval{font-family:'Courier New',monospace;font-size:.7rem;color:var(--gold-light);background:var(--navy);padding:3px 10px;border-radius:6px;letter-spacing:.04em;font-weight:600;}

/* NOT FOUND */
.nf{padding:56px 28px;text-align:center;}
.nfico{width:72px;height:72px;background:rgba(192,57,43,.07);border:1px solid rgba(192,57,43,.22);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;font-size:2rem;}
.nf h2{font-family:var(--serif);font-size:1.8rem;font-weight:700;color:var(--red);margin-bottom:12px;}
.nf p{font-size:.87rem;color:var(--text-mid);line-height:1.75;max-width:340px;margin:0 auto 26px;}
.nfbtn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:var(--radius);background:var(--navy);color:#fff;font-size:.82rem;font-weight:600;font-family:var(--body);transition:all .28s var(--ease);}
.nfbtn:hover{background:var(--ink);transform:translateY(-2px);}

/* LOADING */
.loading{padding:70px 28px;text-align:center;}
.spin{width:34px;height:34px;border:2.5px solid var(--border-mid);border-top-color:var(--ink);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:.84rem;color:var(--text-light);}

/* LIST */
.lhdr{background:linear-gradient(135deg,var(--navy) 0%,#1a3254 100%);padding:30px 28px 22px;position:relative;overflow:hidden;}
.lhdr::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:40px 40px;}
.lhdr::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold-light),transparent);}
.lhi{position:relative;z-index:1;}
.lew{display:inline-flex;align-items:center;gap:8px;font-size:.6rem;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:var(--gold-light);margin-bottom:10px;}
.lew::before,.lew::after{content:'';display:block;height:1px;width:18px;background:var(--gold-light);}
.ltitle{font-family:var(--serif);font-size:1.65rem;font-weight:700;color:#fff;line-height:1.1;margin-bottom:5px;}
.ltitle em{font-style:italic;color:var(--gold-light);font-weight:300;}
.lsub{font-size:.76rem;color:rgba(255,255,255,.4);}
.lcnt{display:flex;align-items:center;gap:8px;padding:10px 14px 4px;font-size:.62rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--text-light);}
.lcnt::after{content:'';flex:1;height:1px;background:var(--border);}
.mlist{display:flex;flex-direction:column;padding:14px;gap:8px;}
.mrow{display:flex;align-items:center;gap:14px;padding:13px 15px;min-height:64px;border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--white);cursor:pointer;text-decoration:none;color:inherit;transition:border-color .25s,box-shadow .25s,transform .25s var(--ease);position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;}
.mrow::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--ink),var(--gold));transform:scaleY(0);transform-origin:bottom;transition:transform .35s var(--ease);}
.mrow:hover{border-color:rgba(26,75,140,.28);box-shadow:var(--shadow-md);transform:translateY(-2px);}
.mrow:hover::before{transform:scaleY(1);}
.mav{width:50px;height:50px;border-radius:10px;background:var(--ink-pale);border:1px solid var(--border-mid);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:1.1rem;font-weight:700;color:var(--ink);flex-shrink:0;overflow:hidden;}
.mav img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block;}
.minfo{flex:1;min-width:0;}
.mn{font-size:.9rem;font-weight:700;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mi{font-size:.64rem;font-weight:600;color:var(--ink);margin-top:2px;font-family:'Courier New',monospace;}
.mr{font-size:.72rem;color:var(--text-mid);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.marr{width:30px;height:30px;border-radius:50%;background:var(--off-white);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text-light);font-size:.9rem;transition:all .25s;}
.mrow:hover .marr{background:var(--navy);color:var(--gold-light);border-color:var(--navy);}

/* PAGE FOOT */
.pfoot{position:relative;z-index:1;margin-top:34px;text-align:center;font-size:.7rem;color:var(--text-light);opacity:0;animation:fU .6s .35s var(--ease) forwards;line-height:1.9;}
.pfoot a{color:var(--ink);font-weight:600;transition:color .2s;}
.pfoot a:hover{color:var(--gold);}
.dot{margin:0 7px;opacity:.35;}

@keyframes fD{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fU{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* ── TABLET / LARGE PHONE ── */
@media(max-width:640px){
  :root{--nav-h:60px;}
  .page{padding:36px 12px 72px;}
  .ntag,.ndiv{display:none;}
  .card{border-radius:var(--radius-lg);}
  .profile{flex-direction:column;gap:0;align-items:center;padding:24px 20px 32px;}
  .avw{display:flex;flex-direction:column;align-items:center;margin-bottom:18px;}
  .av{width:140px;height:140px;font-size:2.6rem;}
  .rpill{bottom:-13px;}
  .pmeta{padding-top:0;align-items:center;text-align:center;}
  .mname{font-size:1.6rem;}
  .mtitle{text-align:center;}
  .mdept{text-align:center;}
  .msig{text-align:center;}
  .dgrid{grid-template-columns:1fr;}
  .dc{border-right:none!important;border-bottom:1px solid var(--border)!important;}
  .dc:nth-last-child(-n+2){border-bottom:1px solid var(--border)!important;}
  .dc:last-child{border-bottom:none!important;}
  .cfoot{flex-direction:column;gap:10px;}
  .hblk{text-align:left;}
  .chdr,.bio,.istrip,.cstrip,.cfoot,.lhdr,.dc,.seal{padding-left:18px;padding-right:18px;}
  .mlist{padding:10px;}
  .clink{padding:8px 12px;font-size:.72rem;}
  .nback{padding:7px 13px;font-size:.7rem;}
  .lhdr{padding:24px 18px 18px;}
  .chdr-logo svg{height:30px;}
}

/* ── STANDARD PHONE (≤480px) ── */
@media(max-width:480px){
  .page{padding:28px 8px 64px;}
  .card{border-radius:var(--radius);}
  .av{width:124px;height:124px;font-size:2.2rem;}
  .mname{font-size:1.45rem;}
  .chdr{padding:16px 16px;}
  .chdr,.bio,.istrip,.cstrip,.cfoot,.lhdr,.dc,.seal{padding-left:14px;padding-right:14px;}
  .profile{padding:20px 14px 28px;}
  .cstrip{gap:8px;}
  .clink{padding:7px 10px;font-size:.7rem;gap:5px;}
  .iico{width:32px;height:32px;flex-shrink:0;}
  .mrow{padding:11px 12px;gap:10px;}
  .mav{width:44px;height:44px;}
  .marr{width:26px;height:26px;}
  .ph h1{font-size:1.7rem;}
  .pfoot{font-size:.65rem;}
  .chdr-logo svg{height:26px;}
}

/* ── SMALL PHONE (≤390px) ── */
@media(max-width:390px){
  :root{--nav-h:54px;}
  .page{padding:22px 6px 56px;}
  .av{width:112px;height:112px;font-size:2rem;}
  .mname{font-size:1.3rem;}
  .chdr,.bio,.istrip,.cstrip,.cfoot,.lhdr,.dc,.seal{padding-left:12px;padding-right:12px;}
  .profile{padding:18px 12px 26px;}
  .clink{padding:6px 9px;font-size:.67rem;}
  .ival{font-size:.8rem;}
  .isub{font-size:.7rem;}
  .dval{font-size:.82rem;}
  .dlbl{font-size:.55rem;}
  .blbl{font-size:.55rem;}
  .btxt{font-size:.8rem;}
  .nback span{display:none;}
  .hval{font-size:.64rem;}
  .chdr-logo svg{height:24px;}
}

/* ── VERY SMALL PHONE (≤360px) ── */
@media(max-width:360px){
  .av{width:100px;height:100px;font-size:1.8rem;}
  .mname{font-size:1.2rem;}
  .navbar{padding:0 10px;}
  .nav-logo img{height:36px;}
  .ph h1{font-size:1.45rem;}
  .cstrip{flex-direction:column;}
  .clink{width:100%;justify-content:center;}
  .lsub{font-size:.7rem;}
}
@media(prefers-color-scheme:dark){:root{color-scheme:light;}html,body{background:#fdfcf9!important;color:#1a2e42!important;}}
@supports(padding:env(safe-area-inset-top)){
  .navbar{padding-left:max(5%,env(safe-area-inset-left));padding-right:max(5%,env(safe-area-inset-right));}
  .page{padding-bottom:max(80px,calc(80px + env(safe-area-inset-bottom)));}
}
  </style>
</head>
<body>

<nav class="navbar">

      <div class="iico gold">${IC.pin}</div>
      <div>
        <div class="ilbl">Location</div>
        <div class="ival" style="font-size:.83rem">${m.location}</div>
      </div>
    </div>
    ${ctHTML(m.contacts)}
    <div class="bio">
      <div class="blbl">About This Member</div>
      <div class="btxt">${m.bio}</div>
    </div>
    <div class="cfoot">
      <div class="fleft">
        <div class="forg">Vision Forge · NUTECH, Islamabad</div>
        <div class="fts">Verified: ${nowS()}</div>
        <div class="gseal">★ &nbsp;Officially Certified Member</div>
      </div>
      <div class="hblk">
        <div class="hlbl">Record Hash</div>
        <div class="hval">#${hash(m.id)}</div>
      </div>
    </div>`;
}

/* ── RENDER NOT FOUND ── */
function renderNotFound(id){
  document.getElementById('app').innerHTML=`
    <div class="chdr">
      <div class="chdr-logo">${VIFO_LOGO}</div>
      <div class="vbadge fail"><span class="bdot"></span>Not Found</div>
    </div>
    <div class="nf">
      <div class="nfico">⚠️</div>
      <h2>Verification Failed</h2>
      <p>No active member found with ID <strong style="color:var(--navy)">${id||'unknown'}</strong>.<br/><br/>
      This QR code may be invalid, expired, or tampered with. Please contact Vision Forge administration.</p>
      <a href="verify.html" class="nfbtn">← View All Members</a>
    </div>`;
}

/* ── RENDER LIST ── */
function renderList(){
  document.querySelector('.card').classList.add('wide');
  document.getElementById('app').innerHTML=`
    <div class="lhdr">
      <div class="lhi">
        <div class="lew"><span></span>Active Roster<span></span></div>
        <h2 class="ltitle">All <em>Members</em></h2>
        <p class="lsub">Select a member to view their official verification card</p>
      </div>
    </div>
    <div class="lcnt">${members.length} Active Members</div>
    <div class="mlist">
      ${members.map(m=>`
        <a class="mrow" href="?id=${m.id}">
          <div class="mav">${avH(m,'mav')}</div>
          <div class="minfo">
            <div class="mn">${m.name}</div>
            <div class="mi">${m.id}</div>
            <div class="mr">${m.title} &nbsp;·&nbsp; ${m.dept}</div>
          </div>
          <div class="marr">›</div>
        </a>`).join('')}
    </div>`;
}

/* ── INIT ── */
const id=getP('id');
if(!id) renderList();
else{ const m=members.find(x=>x.id===id); m?renderMember(m):renderNotFound(id); }
</script>
</body>
</html>
